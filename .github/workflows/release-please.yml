name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  # Maintains a release PR from conventional commits; on merge it tags the
  # release, writes the CHANGELOG, and bumps the version in package.json.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and push a Docker image to GHCR for each release. Uses the built-in
  # GITHUB_TOKEN — no extra secrets required.
  docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Optional: publish to npm on release. Enable by setting repo variable
  # PUBLISH_NPM=true. Auth is via npm Trusted Publishing (OIDC) — no NPM_TOKEN
  # secret. Configure the trusted publisher for this repo + workflow on npmjs.com
  # first. Provenance is attached automatically.
  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' && vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint OIDC token for Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; node 22 ships npm 10.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish --provenance --access public
